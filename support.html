  <h1>技术支持</h1>
  <p><strong>蹲蹲哇（SquatCounter）</strong></p>

  <h2>常见问题</h2>
  <ul>
    <li><strong>计数不准？</strong> 请确保手机 Y 轴与大腿方向一致，可参考应用内「使用手册」的放置说明。</li>
    <li><strong>静蹲无法开始？</strong> 请保持静蹲姿势 300ms 以上，姿势达标后会自动开始计时。</li>
    <li><strong>数据丢失？</strong> 数据存储在本地，卸载应用会清除。建议使用「数据导出」功能备份（高级版）。</li>
  </ul>
